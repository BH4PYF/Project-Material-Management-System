# 材料管理系统 Nginx 配置 - HTTPS 强制跳转
# 文件位置：/etc/nginx/sites-available/material-system-https.conf

# HTTP 到 HTTPS 重定向
server {
    listen 80;
    server_name material.sdyhjzgc.com www.material.sdyhjzgc.com;
    
    # 强制跳转到 HTTPS
    return 301 https://material.sdyhjzgc.com$request_uri;
}

# HTTPS 服务器配置
server {
    listen 443 ssl http2;
    server_name material.sdyhjzgc.com www.material.sdyhjzgc.com;
    
    # SSL 证书配置（请根据实际证书路径修改）
    ssl_certificate /etc/nginx/ssl/material.sdyhjzgc.com.crt;
    ssl_certificate_key /etc/nginx/ssl/material.sdyhjzgc.com.key;
    
    # SSL 优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # OCSP Stapling（可选，提升性能）
    # ssl_stapling on;
    # ssl_stapling_verify on;
    
    # 安全头设置
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;
    
    # 客户端最大上传大小
    client_max_body_size 20M;
    
    # 日志配置
    access_log /var/log/nginx/material-system-access.log;
    error_log /var/log/nginx/material-system-error.log;
    
    # 静态文件处理（Django collectstatic 后的文件）
    location /static/ {
        alias /home/abc/Project-Material-Management-System/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # 媒体文件处理（用户上传的文件）
    location /media/ {
        alias /home/abc/Project-Material-Management-System/media/;
        expires 7d;
        add_header Cache-Control "public";
    }
    
    # Django 应用代理
    location / {
        proxy_pass http://127.0.0.1:8000;
        
        # 重要：传递真实客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket 支持（如果需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_request_buffering on;
    }
    
    # Django admin 静态资源优化
    location /admin/static/ {
        alias /home/abc/Project-Material-Management-System/staticfiles/admin/;
        expires 30d;
        access_log off;
    }
    
    # 健康检查端点
    location /health/ {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
