server {
    listen 443 ssl;
    server_name material.sdyhjzgc.com;

    # SSL 配置
    ssl_certificate /home/abc/material-sdyhjzgc-com/fullchain.pem;
    ssl_certificate_key /home/abc/material-sdyhjzgc-com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 日志配置
    access_log /var/log/nginx/material.sdyhjzgc.com_access.log;
    error_log /var/log/nginx/material.sdyhjzgc.com_error.log;

    # 静态文件配置
    location /static/ {
        alias /home/abc/Project-Material-Management-System/static/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # 媒体文件配置
    location /media/ {
        alias /home/abc/Project-Material-Management-System/media/;
    }

    # 应用配置
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-SSL on;
        proxy_redirect off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # 健康检查
    location /health/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 重定向 HTTP 到 HTTPS
server {
    listen 80;
    server_name material.sdyhjzgc.com;
    return 301 https://$host$request_uri;
}
