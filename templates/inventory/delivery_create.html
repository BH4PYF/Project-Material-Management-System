{% extends "base.html" %}
{% block title %}创建发货单{% endblock %}
{% block page_title %}创建发货单{% endblock %}
{% block content %}
<div class="page-header">
    <h5><i class="bi bi-truck"></i> 创建发货单</h5>
    <a href="{% url 'delivery_list' %}" class="btn btn-secondary btn-sm"><i class="bi bi-arrow-left"></i> 返回</a>
</div>
<div class="card shadow-sm">
    <div class="card-body">
        <form method="post" action="{% url 'delivery_create' %}" data-ajax>
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">选择采购计划 <span class="text-danger">*</span></label>
                    <select class="form-select" name="purchase_plan_id" id="planSelect" required onchange="onPlanChange(this)">
                        <option value="">请选择采购计划</option>
                        {% for plan in purchase_plans %}
                        <option value="{{ plan.id }}" data-material="{{ plan.material.name }}" data-quantity="{{ plan.quantity }}" data-unit="{{ plan.material.unit }}" data-price="{{ plan.unit_price }}" data-spec="{{ plan.spec }}">
                            {{ plan.no }} - {{ plan.project.name }} - {{ plan.material.name }} ({{ plan.spec|default:'' }}) ({{ plan.quantity }}{{ plan.material.unit }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">材料</label>
                    <input type="text" class="form-control" id="materialName" readonly disabled>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">采购计划数量</label>
                    <div class="input-group">
                        <input type="text" class="form-control" id="planQuantity" readonly disabled>
                        <span class="input-group-text" id="planUnit">-</span>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">参考单价</label>
                    <input type="text" class="form-control" id="planPrice" readonly disabled>
                </div>
            </div>
            <hr>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">实际发货数量 <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <input type="number" step="0.01" min="0.01" class="form-control" name="actual_quantity" id="actualQty" required oninput="calcTotal()">
                        <span class="input-group-text" id="actualUnit">-</span>
                    </div>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">实际单价(元) <span class="text-danger">*</span></label>
                    <input type="number" step="0.01" min="0" class="form-control" name="actual_unit_price" id="actualPrice" required oninput="calcTotal()">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">实际金额(元)</label>
                    <input type="text" class="form-control" id="actualTotal" readonly disabled>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">送货方式 <span class="text-danger">*</span></label>
                    <select class="form-select" name="shipping_method" id="shippingMethod" required onchange="onShippingChange(this)">
                        <option value="special">专车</option>
                        <option value="logistics">物流</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3" id="plateNumberDiv">
                    <label class="form-label">车牌号</label>
                    <input type="text" class="form-control" name="plate_number" placeholder="如：京A12345">
                </div>
                <div class="col-md-4 mb-3" id="trackingNoDiv" style="display:none;">
                    <label class="form-label">运单号</label>
                    <input type="text" class="form-control" name="tracking_no" placeholder="请输入物流单号">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">备注</label>
                <textarea class="form-control" name="remark" rows="2"></textarea>
            </div>
            <div class="d-flex justify-content-end">
                <a href="{% url 'delivery_list' %}" class="btn btn-secondary me-2">取消</a>
                <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> 创建发货单</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function onPlanChange(sel) {
    var opt = sel.options[sel.selectedIndex];
    if (!opt.value) {
        document.getElementById('materialName').value = '';
        document.getElementById('planQuantity').value = '';
        document.getElementById('planUnit').textContent = '-';
        document.getElementById('planPrice').value = '';
        document.getElementById('actualUnit').textContent = '-';
        return;
    }
    document.getElementById('materialName').value = opt.dataset.material;
    document.getElementById('planQuantity').value = opt.dataset.quantity;
    document.getElementById('planUnit').textContent = opt.dataset.unit;
    document.getElementById('actualUnit').textContent = opt.dataset.unit;
    document.getElementById('planPrice').value = opt.dataset.price;
    document.getElementById('actualPrice').value = opt.dataset.price;
    calcTotal();
}
function onShippingChange(sel) {
    if (sel.value === 'special') {
        document.getElementById('plateNumberDiv').style.display = 'block';
        document.getElementById('trackingNoDiv').style.display = 'none';
    } else {
        document.getElementById('plateNumberDiv').style.display = 'none';
        document.getElementById('trackingNoDiv').style.display = 'block';
    }
}
function calcTotal() {
    var q = parseFloat(document.getElementById('actualQty').value) || 0;
    var p = parseFloat(document.getElementById('actualPrice').value) || 0;
    document.getElementById('actualTotal').value = (q * p).toFixed(2);
}
</script>
{% endblock %}
