{% extends "base.html" %}
{% block title %}删除分包商{% endblock %}
{% block page_title %}删除分包商{% endblock %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <form method="post" action="{% url 'subcontractor_delete' subcontractor.pk %}">
            {% csrf_token %}
            <div class="alert alert-warning" role="alert">
                <h4 class="alert-heading">确认删除</h4>
                <p>您确定要删除分包商 <strong>{{ subcontractor.name }}</strong> 吗？此操作不可撤销。</p>
                <hr>
                <p class="mb-0">删除后，与该分包商相关的所有数据（如合同、计量、结算等）可能会受到影响。</p>
            </div>
            <div class="row mb-3">
                <div class="col-sm-10 offset-sm-2">
                    <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> 确认删除</button>
                    <a href="{% url 'subcontractor_list' %}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> 取消</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
