{% extends "base.html" %}
{% block title %}创建分包合同{% endblock %}
{% block page_title %}创建分包合同{% endblock %}
{% block content %}
<style>
    /* 合同清单表格样式 */
    .contract-item-table th,
    .contract-item-table td {
        vertical-align: middle;
    }
    .contract-item-table input {
        width: 100%;
    }
    .add-item-btn {
        margin-top: 24px;
    }
</style>
<div class="card shadow-sm">
    <div class="card-body">
        <form method="post" action="{% url 'contract_create' %}">
            {% csrf_token %}
            <div class="row mb-4">
                <label class="col-sm-2 col-form-label">合同名称 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="name" placeholder="请输入合同名称" required>
                </div>
            </div>
            <div class="row mb-4">
                <label class="col-sm-2 col-form-label">项目名称 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <select class="form-select" name="project" required>
                        <option value="">请选择项目</option>
                        {% for p in projects %}
                        <option value="{{ p.pk }}">{{ p.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="row mb-4">
                <label class="col-sm-2 col-form-label">分包商 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <select class="form-select" name="subcontractor" required>
                        <option value="">请选择分包商</option>
                        {% for s in subcontractors %}
                        <option value="{{ s.pk }}">{{ s.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <h6 class="mb-3">合同清单</h6>
            <div class="table-responsive mb-4">
                <table class="table table-hover contract-item-table" id="contractItemTable">
                    <thead>
                        <tr>
                            <th>清单序号</th>
                            <th>清单名称 <span class="text-danger">*</span></th>
                            <th>分类</th>
                            <th>施工参数</th>
                            <th>计量单位</th>
                            <th>工程量 <span class="text-danger">*</span></th>
                            <th>单价 <span class="text-danger">*</span></th>
                            <th>合价</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="contract-item-row">
                            <td><input type="number" class="form-control form-control-sm" name="item_order" value="1" required></td>
                            <td>
                                <select class="form-select form-select-sm subcontract-list-select" name="subcontract_list" required>
                                    <option value="">请选择清单</option>
                                    {% for sl in subcontract_lists %}
                                    <option value="{{ sl.pk }}" data-category="{{ sl.category }}" data-params="{{ sl.construction_params }}" data-unit="{{ sl.unit }}">
                                        {{ sl.name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </td>
                            <td><input type="text" class="form-control form-control-sm category-input" name="category" readonly></td>
                            <td><input type="text" class="form-control form-control-sm params-input" name="construction_params" readonly></td>
                            <td><input type="text" class="form-control form-control-sm unit-input" name="unit" readonly></td>
                            <td><input type="number" step="0.01" class="form-control form-control-sm quantity-input" name="quantity" required></td>
                            <td><input type="number" step="0.01" class="form-control form-control-sm unit-price-input" name="unit_price" required></td>
                            <td><input type="number" step="0.01" class="form-control form-control-sm total-amount-input" name="total_amount" readonly></td>
                            <td><button type="button" class="btn btn-sm btn-outline-danger remove-item-btn"><i class="bi bi-trash"></i></button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="row mb-4">
                <div class="col-sm-10 offset-sm-2">
                    <button type="button" class="btn btn-sm btn-outline-success add-item-btn" id="addContractItemBtn"><i class="bi bi-plus-lg"></i> 添加清单</button>
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-sm-10 offset-sm-2">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> 保存</button>
                    <a href="{% url 'contract_list' %}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> 返回</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 处理分包清单选择
        document.addEventListener('change', function(e) {
            if (e.target.classList.contains('subcontract-list-select')) {
                const selectedOption = e.target.options[e.target.selectedIndex];
                const row = e.target.closest('.contract-item-row');
                
                row.querySelector('.category-input').value = selectedOption.dataset.category || '';
                row.querySelector('.params-input').value = selectedOption.dataset.params || '';
                row.querySelector('.unit-input').value = selectedOption.dataset.unit || '';
                
                // 计算合价
                calculateTotal(row);
            }
        });
        
        // 处理工程量和单价变化
        document.addEventListener('input', function(e) {
            if (e.target.classList.contains('quantity-input') || e.target.classList.contains('unit-price-input')) {
                const row = e.target.closest('.contract-item-row');
                calculateTotal(row);
            }
        });
        
        // 计算合价
        function calculateTotal(row) {
            const quantity = parseFloat(row.querySelector('.quantity-input').value) || 0;
            const unitPrice = parseFloat(row.querySelector('.unit-price-input').value) || 0;
            const totalAmount = quantity * unitPrice;
            row.querySelector('.total-amount-input').value = totalAmount.toFixed(2);
        }
        
        // 添加清单行
        document.getElementById('addContractItemBtn').addEventListener('click', function() {
            const table = document.getElementById('contractItemTable');
            const tbody = table.querySelector('tbody');
            const lastRow = tbody.lastElementChild;
            const newRow = lastRow.cloneNode(true);
            
            // 清除输入值
            const inputs = newRow.querySelectorAll('input');
            inputs.forEach(input => {
                if (!input.readOnly) {
                    input.value = '';
                } else {
                    input.value = '';
                }
            });
            
            // 重置选择框
            const select = newRow.querySelector('select');
            select.value = '';
            
            // 更新序号
            const rowCount = tbody.children.length + 1;
            newRow.querySelector('input[name="item_order"]').value = rowCount;
            
            // 为新行的按钮添加事件
            newRow.querySelector('.remove-item-btn').addEventListener('click', function() {
                if (tbody.children.length > 1) {
                    this.closest('.contract-item-row').remove();
                    // 重新编号
                    updateRowNumbers();
                }
            });
            
            tbody.appendChild(newRow);
        });
        
        // 删除清单行
        document.querySelectorAll('.remove-item-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const tbody = this.closest('tbody');
                if (tbody.children.length > 1) {
                    this.closest('.contract-item-row').remove();
                    // 重新编号
                    updateRowNumbers();
                }
            });
        });
        
        // 更新行号
        function updateRowNumbers() {
            const rows = document.querySelectorAll('.contract-item-row');
            rows.forEach((row, index) => {
                row.querySelector('input[name="item_order"]').value = index + 1;
            });
        }
    });
</script>
{% endblock %}
