{% extends "base.html" %}
{% block title %}编辑分包商{% endblock %}
{% block page_title %}编辑分包商{% endblock %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <form method="post" action="{% url 'subcontractor_edit' subcontractor.pk %}">
            {% csrf_token %}
            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">分包商名称 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="name" value="{{ subcontractor.name }}" placeholder="请输入分包商名称" required>
                </div>
            </div>
            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">负责人 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="contact" value="{{ subcontractor.contact }}" placeholder="请输入负责人姓名" required>
                </div>
            </div>
            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">电话 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="phone" value="{{ subcontractor.phone }}" placeholder="请输入联系电话" required>
                </div>
            </div>
            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">主营类型 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <select class="form-select" name="main_type" required>
                        <option value="">请选择</option>
                        {% for category in categories %}
                        <option value="{{ category.category_name }}" {% if subcontractor.main_type == category.category_name %}selected{% endif %}>{{ category.category_name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">信用等级 <span class="text-danger">*</span></label>
                <div class="col-sm-10">
                    <select class="form-select" name="credit_rating" required>
                        <option value="">请选择</option>
                        <option value="excellent" {% if subcontractor.credit_rating == 'excellent' %}selected{% endif %}>优秀</option>
                        <option value="good" {% if subcontractor.credit_rating == 'good' %}selected{% endif %}>良好</option>
                        <option value="average" {% if subcontractor.credit_rating == 'average' %}selected{% endif %}>一般</option>
                    </select>
                </div>
            </div>
            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">备注</label>
                <div class="col-sm-10">
                    <textarea class="form-control" name="remark" rows="3" placeholder="请输入备注信息">{{ subcontractor.remark }}</textarea>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-sm-10 offset-sm-2">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> 保存</button>
                    <a href="{% url 'subcontractor_list' %}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> 返回</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
