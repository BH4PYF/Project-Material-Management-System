{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>登录 - {{ navbar_title|default:'材料管理系统' }}</title>
    <!-- Bootstrap CSS（本地文件） -->
    <link href="{% static 'vendor/bootstrap/bootstrap.min.css' %}" rel="stylesheet">
    <!-- Bootstrap Icons（本地文件） -->
    <link href="{% static 'vendor/bootstrap-icons/bootstrap-icons.min.css' %}" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a3a5c 0%, #2d5a8e 50%, #1a3a5c 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 480px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .login-header { background: linear-gradient(135deg, #0d6efd, #0b5ed7); color: white; border-radius: 12px 12px 0 0; padding: 2.5rem; text-align: center; }
        .login-header h3 { margin-bottom: 0.5rem; font-size: 1.75rem; font-weight: 600; }
        .login-header small { font-size: 1rem; opacity: 0.9; }
        .login-body { padding: 2.5rem; }
        .form-floating { margin-bottom: 1.25rem; }
    </style>
</head>
<body>
    <div class="login-card bg-white">
        <div class="login-header">
            <h3><i class="bi bi-building"></i> {{ navbar_title|default:'材料管理系统' }}</h3>
            <small>工程项目材料管理平台</small>
        </div>
        <div class="login-body">
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger py-2 small">{{ message }}</div>
            {% endfor %}
            {% endif %}
            <div id="loginAlertContainer"></div>
            <form method="post" action="{% url 'login' %}" id="loginForm">
                {% csrf_token %}
                <div class="form-floating">
                    <input type="text" class="form-control" id="username" name="username" placeholder="用户名" required autofocus>
                    <label for="username"><i class="bi bi-person"></i> 用户名</label>
                </div>
                <div class="form-floating">
                    <input type="password" class="form-control" id="password" name="password" placeholder="密码" required>
                    <label for="password"><i class="bi bi-lock"></i> 密码</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 mt-2">
                    <i class="bi bi-box-arrow-in-right"></i> 登 录
                </button>
            </form>
        </div>
    </div>
    <script>
// CSRF Token 获取
function getCookie(name) {
    let v = null;
    if (document.cookie && document.cookie !== '') {
        document.cookie.split(';').forEach(function(c) {
            c = c.trim();
            if (c.startsWith(name + '=')) {
                v = decodeURIComponent(c.substring(name.length + 1));
            }
        });
    }
    return v;
}
const csrftoken = getCookie('csrftoken');

// 显示消息提示
function showLoginAlert(message, type) {
    const container = document.getElementById('loginAlertContainer');
    container.innerHTML = '';
    const alertDiv = document.createElement('div');
    alertDiv.className = 'alert alert-' + type + ' alert-dismissible fade show';
    alertDiv.textContent = message;
    var closeBtn = document.createElement('button');
    closeBtn.type = 'button';
    closeBtn.className = 'btn-close';
    closeBtn.setAttribute('data-bs-dismiss', 'alert');
    alertDiv.appendChild(closeBtn);
    container.appendChild(alertDiv);
    setTimeout(function() {
        if (alertDiv.parentNode) alertDiv.remove();
    }, 5000);
}

// 绑定登录表单 AJAX 提交
document.addEventListener('DOMContentLoaded', function() {
    const loginForm = document.getElementById('loginForm');
    if (loginForm) {
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            
            // 显示加载状态
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> 登录中...';
            
            fetch(this.action, {
                method: 'POST',
                headers: {
                    'X-CSRFToken': csrftoken,
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showLoginAlert(data.message || '登录成功，正在跳转...', 'success');
                    setTimeout(function() {
                        // 根据 redirect_url 值跳转到正确的路径
                        if (data.redirect_url === 'delivery_list') {
                            window.location.href = '/deliveries/';
                        } else if (data.redirect_url === 'dashboard') {
                            window.location.href = '/';
                        } else {
                            window.location.href = data.redirect_url || '/';
                        }
                    }, 800);
                } else {
                    showLoginAlert(data.error || '登录失败，请检查用户名和密码', 'danger');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                }
            })
            .catch(err => {
                console.error('AJAX Error:', err);
                showLoginAlert('请求失败，请重试', 'danger');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            });
        });
    }
});
    </script>
    <!-- Bootstrap JS（本地文件） -->
    <script src="{% static 'vendor/bootstrap/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
