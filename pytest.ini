[pytest]
DJANGO_SETTINGS_MODULE = minierp.settings
python_files = tests.py test_*.py *_tests.py
# --reuse-db: 复用测试数据库，避免每次重建 schema（首次或 model 变更后用 --create-db 刷新）
# --no-migrations: 跳过 21 个迁移文件执行，直接根据 model 建表，节省 ~1s
# -q: 精简输出减少 I/O
addopts = --reuse-db --no-migrations -q
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
